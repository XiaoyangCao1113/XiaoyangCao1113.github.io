<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Xiaoyang Cao</title>
<meta name="robots" content="noindex">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#FAF8F4">
<link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml">
<link rel="preload" href="/fonts/newsreader-roman.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'Newsreader';font-style:normal;font-weight:400 600;font-display:swap;src:url(/fonts/newsreader-roman.woff2) format('woff2')}
:root{--paper:#FAF8F4;--ink:#1E1A16;--muted:#706960;--line:#E3DDD4;--accent:#8C2B32;--accent-deep:#651D23}
*{box-sizing:border-box}
html{color-scheme:only light}
body{display:grid;min-height:100svh;margin:0;padding:2rem;place-items:center;background:linear-gradient(180deg,#FFFDF9,var(--paper));color:var(--ink);font-family:system-ui,'Segoe UI',sans-serif;line-height:1.65}
main{width:min(100%,38rem);padding:clamp(2rem,7vw,4rem);background:#fff;border:1px solid var(--line);border-radius:1.5rem;box-shadow:0 18px 54px rgba(45,35,27,.08)}
.code{margin:0;font-family:Consolas,monospace;font-size:.72rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
h1{margin:.65rem 0 1rem;font-family:'Newsreader',Georgia,serif;font-size:clamp(2.7rem,9vw,4.2rem);font-weight:500;letter-spacing:-.035em;line-height:.95}
p{margin:0;color:var(--muted)}
.home-link{display:inline-flex;margin-top:1.5rem;padding:.68rem 1rem;border-radius:999px;background:var(--accent);color:#fff;font-size:.85rem;font-weight:650;text-decoration:none}
.home-link:hover{background:var(--accent-deep)}
.home-link:focus-visible{outline:2px solid var(--accent);outline-offset:4px}
</style>
</head>
<body>
<main>
  <p class="code">404</p>
  <h1>Page not found</h1>
  <p>This page may have moved when the site was rebuilt.</p>
  <a class="home-link" href="/">Back to the homepage</a>
</main>
<script>
(function(){
  var map={
    '/publications':'/#publications',
    '/cv':'/files/CV_Xiaoyang_Cao.pdf',
    '/year-archive':'/#news',
    '/about':'/','/talks':'/','/teaching':'/','/portfolio':'/',
    '/markdown':'/','/sitemap':'/','/non-menu-page':'/','/talkmap':'/','/terms':'/'
  };
  var p=(location.pathname.replace(/\.html$/,'').replace(/\/+$/,'')||'/').toLowerCase();
  if(map[p])location.replace(map[p]);
})();
</script>
</body>
</html>
